name: Deploy Angular

on:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Replace API key in environment files
        run: |
          sed -i "s|PLACEHOLDER_API_KEY|${{ secrets.API_KEY }}|g" src/environments/environment.prod.ts
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/simbirsoft-soccerstat/browser
      - uses: actions/deploy-pages@v4
